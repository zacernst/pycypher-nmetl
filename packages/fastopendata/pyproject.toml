[build-system]
requires = [ "hatchling>=1.24.2", "hatch-vcs>=0.3.0",]
build-backend = "hatchling.build"

[project]
name = "fastopendata"
version = "0.0.1"
description = "Fast open data ingestion and processing for PyCypher"
readme = "README.md"
requires-python = ">=3.12"
keywords = ["open data", "ingestion", "etl"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
dependencies = [
    "shared",
    "pycypher",
    "pandas>=3.0.0,<4.0.0",
    "pydantic>=2.0.0,<3.0.0",
    "fastapi>=0.115.0,<1.0.0",
    "uvicorn[standard]>=0.30.0,<1.0.0",
    "snakemake>=9.18.2,<10.0.0",
    "dbfread>=2.0.7,<3.0.0",
    "osmium>=4.3.0,<5.0.0",
    "pyogrio>=0.12.1,<1.0.0",
    "geopandas>=1.1.3,<2.0.0",
    "shapely>=2.1.2,<3.0.0",
    "rich>=14.3.3,<15.0.0",
]

[[project.authors]]
name = "Zachary Ernst"
email = "zac.ernst@gmail.com"

[[project.maintainers]]
name = "Zachary Ernst"
email = "zac.ernst@gmail.com"

[project.license]
file = "LICENSE.txt"

[project.urls]
Homepage = "https://github.com/zacernst/pycypher"

[project.scripts]

[tool.hatchling.build.targets.wheel]
# Only include source code, exclude raw data and other unnecessary files
include = [
    "src/fastopendata",
]
exclude = [
    "raw_data/",
    "tmp/",
    ".snakemake/",
    "*.txt",
    "out",
    "__pycache__/",
    "*.pyc",
    "tests/",  # Exclude tests from wheel
]

# Tool config (ruff, coverage, pytest) is inherited from the workspace root
# pyproject.toml. Do not duplicate it here.
