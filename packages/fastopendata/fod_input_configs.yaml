  - id: school_is_charter
    description: "Flag School nodes that are charter schools"
    inline: "MATCH (s:School) WITH s, s.CHARTER_TEXT = 'Yes' AS is_charter SET s.is_charter = is_charter"
    property_types:
      is_charter: bool

  - id: school_federal_revenue_share
    description: "Compute the share of total revenue derived from federal sources for each School node"
    inline: "MATCH (s:School) WHERE s.Z33S IS NOT NULL AND s.Z33S > 0 WITH s, s.V11S / s.Z33S AS federal_revenue_share SET s.federal_revenue_share = federal_revenue_share"
    property_types:
      federal_revenue_share: float

  - id: school_high_federal_dependency_flag
    description: "Flag schools where federal revenue exceeds 25% of total revenue, indicating elevated dependency on federal funding"
    inline: "MATCH (s:School) WHERE s.federal_revenue_share IS NOT NULL WITH s, s.federal_revenue_share > 0.25 AS is_high_federal_dependency SET s.is_high_federal_dependency = is_high_federal_dependency"
    property_types:
      is_high_federal_dependency: bool

  - id: county_avg_per_pupil_spend
    description: "Aggregate average per-pupil total expenditure across all schools in each County"
    inline: "MATCH (s:School)-[:LOCATED_IN]->(c:County) WHERE s.CE4S IS NOT NULL WITH c, AVG(s.CE4S) AS school_avg_per_pupil_spend SET c.school_avg_per_pupil_spend = school_avg_per_pupil_spend"
    property_types:
      school_avg_per_pupil_spend: float

  - id: county_school_count
    description: "Count the number of schools located in each County"
    inline: "MATCH (s:School)-[:LOCATED_IN]->(c:County) WITH c, COUNT(s) AS school_count SET c.school_count = school_count"
    property_types:
      school_count: int

  - id: county_charter_school_share
    description: "Compute the share of schools in each County that are charter schools"
    inline: "MATCH (s:School)-[:LOCATED_IN]->(c:County) WITH c, AVG(CASE WHEN s.is_charter THEN 1.0 ELSE 0.0 END) AS school_charter_share SET c.school_charter_share = school_charter_share"
    property_types:
      school_charter_share: float

  - id: county_avg_federal_revenue_share
    description: "Average federal revenue share across schools in each County; high values indicate elevated exposure to federal funding cuts"
    inline: "MATCH (s:School)-[:LOCATED_IN]->(c:County) WHERE s.Z33S IS NOT NULL AND s.Z33S > 0 WITH c, AVG(s.V11S / s.Z33S) AS school_avg_federal_revenue_share SET c.school_avg_federal_revenue_share = school_avg_federal_revenue_share"
    property_types:
      school_avg_federal_revenue_share: float

  - id: county_avg_local_revenue_share
    description: "Average local revenue share across schools in each County; high values correlate with property-tax-rich counties"
    inline: "MATCH (s:School)-[:LOCATED_IN]->(c:County) WHERE s.Z33S IS NOT NULL AND s.Z33S > 0 WITH c, AVG(s.V10S / s.Z33S) AS school_avg_local_revenue_share SET c.school_avg_local_revenue_share = school_avg_local_revenue_share"
    property_types:
      school_avg_local_revenue_share: float

  - id: county_total_enrollment
    description: "Total student enrollment across all schools in each County"
    inline: "MATCH (s:School)-[:LOCATED_IN]->(c:County) WHERE s.MEMBER IS NOT NULL WITH c, SUM(s.MEMBER) AS school_total_enrollment SET c.school_total_enrollment = school_total_enrollment"
    property_types:
      school_total_enrollment: float

  - id: county_avg_instruction_spend_share
    description: "Average share of expenditures directed to instruction across schools in each County; a proxy for how much spending reaches students vs. administration"
    inline: "MATCH (s:School)-[:LOCATED_IN]->(c:County) WHERE s.E17S IS NOT NULL AND s.E17S > 0 WITH c, AVG(s.V13S / s.E17S) AS school_avg_instruction_spend_share SET c.school_avg_instruction_spend_share = school_avg_instruction_spend_share"
    property_types:
      school_avg_instruction_spend_share: float

  - id: county_elementary_school_count
    description: "Count of elementary schools in each County"
    inline: "MATCH (s:School)-[:LOCATED_IN]->(c:County) WHERE s.LEVEL = 'Elementary' WITH c, COUNT(s) AS school_elementary_count SET c.school_elementary_count = school_elementary_count"
    property_types:
      school_elementary_count: int

  - id: county_middle_school_count
    description: "Count of middle schools in each County"
    inline: "MATCH (s:School)-[:LOCATED_IN]->(c:County) WHERE s.LEVEL = 'Middle' WITH c, COUNT(s) AS school_middle_count SET c.school_middle_count = school_middle_count"
    property_types:
      school_middle_count: int

  - id: county_high_school_count
    description: "Count of high schools in each County"
    inline: "MATCH (s:School)-[:LOCATED_IN]->(c:County) WHERE s.LEVEL = 'High' WITH c, COUNT(s) AS school_high_count SET c.school_high_count = school_high_count"
    property_types:
      school_high_count: int

  - id: county_special_ed_school_share
    description: "Share of schools in each County classified as special education (SCH_TYPE = 2)"
    inline: "MATCH (s:School)-[:LOCATED_IN]->(c:County) WITH c, AVG(CASE WHEN s.SCH_TYPE = '2' THEN 1.0 ELSE 0.0 END) AS school_special_ed_share SET c.school_special_ed_share = school_special_ed_share"
    property_types:
      school_special_ed_share: float

  - id: county_high_federal_dependency_school_share
    description: "Share of schools in each County where federal revenue exceeds 25% of total revenue; a county-level policy risk signal"
    inline: "MATCH (s:School)-[:LOCATED_IN]->(c:County) WHERE s.is_high_federal_dependency IS NOT NULL WITH c, AVG(CASE WHEN s.is_high_federal_dependency THEN 1.0 ELSE 0.0 END) AS school_high_federal_dependency_share SET c.school_high_federal_dependency_share = school_high_federal_dependency_share"
    property_types:
      school_high_federal_dependency_share: float

  - id: state_avg_per_pupil_spend
    description: "Average per-pupil expenditure across all schools in each State; prerequisite for county deviation calculation"
    inline: "MATCH (s:School)-[:LOCATED_IN]->(c:County)-[:LOCATED_IN]->(st:State) WHERE s.CE4S IS NOT NULL WITH st, AVG(s.CE4S) AS school_avg_per_pupil_spend SET st.school_avg_per_pupil_spend = school_avg_per_pupil_spend"
    property_types:
      school_avg_per_pupil_spend: float

  - id: county_per_pupil_spend_vs_state_avg
    description: "Difference between a County's average per-pupil spend and its State's average; positive values indicate above-average local investment"
    inline: "MATCH (c:County)-[:LOCATED_IN]->(st:State) WHERE c.school_avg_per_pupil_spend IS NOT NULL AND st.school_avg_per_pupil_spend IS NOT NULL WITH c, c.school_avg_per_pupil_spend - st.school_avg_per_pupil_spend AS school_per_pupil_spend_vs_state_avg SET c.school_per_pupil_spend_vs_state_avg = school_per_pupil_spend_vs_state_avg"
    property_types:
      school_per_pupil_spend_vs_state_avg: float

  - id: nri_composite_risk
    description: "Copy NRI composite risk, EAL, social vulnerability, and resilience scores onto each Tract node"
    inline: "MATCH (t:Tract) WITH t, t.RISK_SCORE AS risk_score, t.RISK_RATNG AS risk_rating, t.EAL_VALT AS eal_total, t.EAL_SCORE AS eal_score, t.SOVI_SCORE AS social_vulnerability_score, t.RESL_SCORE AS resilience_score SET t.nri_risk_score = risk_score, t.nri_risk_rating = risk_rating, t.nri_eal_total = eal_total, t.nri_eal_score = eal_score, t.nri_social_vulnerability = social_vulnerability_score, t.nri_resilience = resilience_score"

  - id: nri_flood_risk
    description: "Set riverine flood risk score, rating, and annualized building loss on each Tract node"
    inline: "MATCH (t:Tract) WITH t, t.RFLD_RISKS AS nri_flood_risk_score, t.RFLD_RISKR AS flood_risk_rating, t.RFLD_EALB AS flood_building_eal SET t.nri_flood_risk_score = nri_flood_risk_score, t.flood_risk_rating = flood_risk_rating, t.flood_building_eal = flood_building_eal"

  - id: nri_high_flood_risk_flag
    description: "Flag tracts where riverine flood risk score exceeds the 75th-percentile threshold (score > 75)"
    inline: "MATCH (t:Tract) WITH t, t.nri_flood_risk_score > 75 AS is_high_flood_risk SET t.is_high_flood_risk = is_high_flood_risk"

  - id: nri_wildfire_risk
    description: "Set wildfire risk score, rating, and annualized building loss on each Tract node"
    inline: "MATCH (t:Tract) WITH t, t.WFIR_RISKS AS nri_wildfire_risk_score, t.WFIR_RISKR AS wildfire_risk_rating, t.WFIR_EALB AS wildfire_building_eal SET t.nri_wildfire_risk_score = nri_wildfire_risk_score, t.wildfire_risk_rating = wildfire_risk_rating, t.wildfire_building_eal = wildfire_building_eal"

  - id: nri_high_wildfire_risk_flag
    description: "Flag tracts where wildfire risk score exceeds the 75th-percentile threshold (score > 75)"
    inline: "MATCH (t:Tract) WITH t, t.nri_wildfire_risk_score > 75 AS is_high_wildfire_risk SET t.is_high_wildfire_risk = is_high_wildfire_risk"

  - id: nri_hurricane_risk
    description: "Set hurricane risk score, rating, and annualized building loss on each Tract node"
    inline: "MATCH (t:Tract) WITH t, t.HRCN_RISKS AS nri_hurricane_risk_score, t.HRCN_RISKR AS hurricane_risk_rating, t.HRCN_EALB AS hurricane_building_eal SET t.nri_hurricane_risk_score = nri_hurricane_risk_score, t.hurricane_risk_rating = hurricane_risk_rating, t.hurricane_building_eal = hurricane_building_eal"

  - id: nri_high_hurricane_risk_flag
    description: "Flag tracts where hurricane risk score exceeds the 75th-percentile threshold (score > 75)"
    inline: "MATCH (t:Tract) WITH t, t.nri_hurricane_risk_score > 75 AS is_high_hurricane_risk SET t.is_high_hurricane_risk = is_high_hurricane_risk"

  - id: nri_earthquake_risk
    description: "Set earthquake risk score, rating, and annualized building loss on each Tract node"
    inline: "MATCH (t:Tract) WITH t, t.ERQK_RISKS AS nri_earthquake_risk_score, t.ERQK_RISKR AS earthquake_risk_rating, t.ERQK_EALB AS earthquake_building_eal SET t.nri_earthquake_risk_score = nri_earthquake_risk_score, t.earthquake_risk_rating = earthquake_risk_rating, t.earthquake_building_eal = earthquake_building_eal"

  - id: nri_high_earthquake_risk_flag
    description: "Flag tracts where earthquake risk score exceeds the 75th-percentile threshold (score > 75)"
    inline: "MATCH (t:Tract) WITH t, t.nri_earthquake_risk_score > 75 AS is_high_earthquake_risk SET t.is_high_earthquake_risk = is_high_earthquake_risk"

  - id: nri_wind_hail_tornado_risk
    description: "Set tornado, strong wind, and hail risk scores and annualized building losses on each Tract node"
    inline: "MATCH (t:Tract) WITH t, t.TRND_RISKS AS nri_tornado_risk_score, t.TRND_EALB AS tornado_building_eal, t.SWND_RISKS AS wind_risk_score, t.SWND_EALB AS wind_building_eal, t.HAIL_RISKS AS hail_risk_score, t.HAIL_EALB AS hail_building_eal SET t.nri_tornado_risk_score = nri_tornado_risk_score, t.tornado_building_eal = tornado_building_eal, t.wind_risk_score = wind_risk_score, t.wind_building_eal = wind_building_eal, t.hail_risk_score = hail_risk_score, t.hail_building_eal = hail_building_eal"

  - id: nri_combined_building_eal
    description: "Sum annualized building losses across all six key hazards to produce a single per-tract property-risk estimate"
    inline: "MATCH (t:Tract) WITH t, t.flood_building_eal + t.wildfire_building_eal + t.hurricane_building_eal + t.earthquake_building_eal + t.tornado_building_eal + t.wind_building_eal + t.hail_building_eal AS nri_combined_building_eal SET t.nri_combined_building_eal = nri_combined_building_eal"

  - id: nri_elevated_property_risk_flag
    description: "Flag tracts whose combined annualized building loss across all six hazards exceeds $100,000 per year"
    inline: "MATCH (t:Tract) WITH t, t.nri_combined_building_eal > 100000 AS is_elevated_property_risk SET t.is_elevated_property_risk = is_elevated_property_risk"

