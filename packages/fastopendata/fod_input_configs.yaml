queries:
  - id: counties_in_state
    description: "Get all the relationships -- test"
    inline: "MATCH (s:State)<-[:LOCATED_IN]-(c:County) WITH DISTINCT id(s) AS state_name, id(c) AS county_name RETURN state_name, county_name"

  - id: tracts_in_county
    description: "Get all the relationships -- test"
    inline: MATCH (c:County)<-[:LOCATED_IN]-(t:Tract) WITH DISTINCT id(c) AS county_name, id(t) AS tract_name RETURN county_name, tract_name

  - id: num_counties_in_state
    description: "Do a simple test aggregation"
    inline: MATCH (s:State)<-[:LOCATED_IN]-(c:County) WITH DISTINCT s, COUNT(c) AS num_counties SET s.num_counties = num_counties

  - id: is_large_state
    description: "Do a simple test aggregation"
    inline: MATCH (s:State) WITH s, s.num_counties > 100 AS is_large_state SET s.is_large_state = is_large_state

  - id: osm_longitude
    description: "Test retrieving raw longitude value"
    inline: MATCH (o:OSMNode) WITH o.longitude AS longitude, id(o) AS identifier, o SET o.foo = longitude + 1000 WITH identifier, o.foo AS foo, o.decoded_tags AS decoded_tags RETURN identifier, foo, decoded_tags

  - id: decode_tags
    description: "Testing whether we can call a function to decode serialized data"
    inline: MATCH (o:OSMNode) WITH o.encoded_tags AS encoded_tags, o SET o.decoded_tags = decode_serialized(encoded_tags)
    property_types:
      decoded_tags: str

  - id: county_rucc_is_metro
    description: "Flag County nodes in metro areas (RUCC codes 1-3)"
    inline: "MATCH (c:County) WHERE c.rucc_2023 IS NOT NULL WITH c, c.rucc_2023 <= 3 AS is_metro SET c.is_metro = is_metro"
    property_types:
      is_metro: bool

  - id: county_rucc_is_rural
    description: "Flag County nodes that are completely rural (RUCC codes 8-9)"
    inline: "MATCH (c:County) WHERE c.rucc_2023 IS NOT NULL WITH c, c.rucc_2023 >= 8 AS is_rural SET c.is_rural = is_rural"
    property_types:
      is_rural: bool

  - id: county_rucc_classification
    description: "Set a three-way metro/nonmetro_urban/rural classification string on each County node"
    inline: "MATCH (c:County) WHERE c.rucc_2023 IS NOT NULL WITH c, CASE WHEN c.rucc_2023 <= 3 THEN 'metro' WHEN c.rucc_2023 <= 7 THEN 'nonmetro_urban' ELSE 'rural' END AS rucc_class SET c.rucc_class = rucc_class"
    property_types:
      rucc_class: str

  - id: tract_rucc_code
    description: "Propagate county RUCC code and description down to each tract"
    inline: "MATCH (t:Tract)-[:LOCATED_IN]->(c:County) SET t.rucc_2023 = c.rucc_2023, t.rucc_description = c.rucc_description"
    property_types:
      rucc_2023: int

  - id: puma_rucc_stats
    description: "Compute average RUCC score and rural/metro tract fractions for each PUMA"
    inline: "MATCH (pu:PUMA)<-[:LOCATED_IN]-(t:Tract)-[:LOCATED_IN]->(c:County) WHERE c.rucc_2023 IS NOT NULL WITH pu, AVG(toFloat(c.rucc_2023)) AS avg_rucc_score, SUM(CASE WHEN c.rucc_2023 >= 8 THEN 1 ELSE 0 END) AS rural_tracts, SUM(CASE WHEN c.rucc_2023 <= 3 THEN 1 ELSE 0 END) AS metro_tracts, COUNT(t) AS total_tracts SET pu.avg_rucc_score = avg_rucc_score, pu.pct_rural_tracts = toFloat(rural_tracts) / total_tracts, pu.pct_metro_tracts = toFloat(metro_tracts) / total_tracts"

  - id: state_rucc_stats
    description: "Roll up RUCC stats from PUMA to State and count rural and metro counties directly"
    inline: "MATCH (s:State)<-[:LOCATED_IN]-(c:County) WHERE c.rucc_2023 IS NOT NULL WITH s, AVG(toFloat(c.rucc_2023)) AS avg_rucc_score, SUM(CASE WHEN c.rucc_2023 >= 8 THEN 1 ELSE 0 END) AS rural_county_count, SUM(CASE WHEN c.rucc_2023 <= 3 THEN 1 ELSE 0 END) AS metro_county_count, COUNT(c) AS total_counties SET s.avg_rucc_score = avg_rucc_score, s.pct_rural_counties = toFloat(rural_county_count) / total_counties, s.pct_metro_counties = toFloat(metro_county_count) / total_counties, s.rural_county_count = rural_county_count, s.metro_county_count = metro_county_count"

  - id: puma_population_1yr
    description: "Count ACS PUMS person records per PUMA as population estimate"
    inline: "MATCH (pu:PUMA)<-[:LOCATED_IN]-(p:PersonSurvey1yr) WITH pu, COUNT(p) AS pop_estimate_1yr SET pu.pop_estimate_1yr = pop_estimate_1yr"

  - id: puma_housing_units_1yr
    description: "Count ACS PUMS housing units per PUMA"
    inline: "MATCH (pu:PUMA)<-[:LOCATED_IN]-(h:HousingSurvey1yr) WITH pu, COUNT(h) AS housing_unit_count_1yr SET pu.housing_unit_count_1yr = housing_unit_count_1yr"

