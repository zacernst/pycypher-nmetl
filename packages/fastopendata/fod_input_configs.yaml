        STATE_FIPS: STRING
        COUNTY_FIPS: STRING
        TRACT_FIPS: STRING
        PUMA_FIPS: STRING
    - id: puma_crosswalk
      uri: "file:///run/media/zac/2tb/fastopendata/data/state_county_tract_puma_crosswalk.csv"
      entity_type: PUMA
      id_col: PUMA_FIPS
      schema_hints:
        STATEFP: STRING
        COUNTYFP: STRING
        TRACTFP: STRING
        PUMA5CE: STRING
        STATE_FIPS: STRING
        COUNTY_FIPS: STRING
        TRACT_FIPS: STRING
