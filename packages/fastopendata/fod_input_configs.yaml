      uri: "file:///mnt/2tb/fastopendata/sample_data/united_states_nodes_tract_crosswalk.parquet"
      entity_type: OSMNode
      id_col: id
      schema_hints:
        longitude: FLOAT
        latitude: FLOAT
        encoded_tags: STRING
        id: BIGINT

    - id: state_crosswalk
      uri: "file:///mnt/2tb/fastopendata/sample_data/state_county_tract_puma_crosswalk.csv"
