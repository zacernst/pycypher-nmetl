    - id: person_works_in_occ_group
      uri: "file:///mnt/2tb/fastopendata/sample_data/psam_pus.parquet"
      relationship_type: WORKS_IN
      source_entity_type: PersonSurvey1yr
      target_entity_type: OccupationGroup
      source_col: PERSON_ID
      target_col: occ_group
      query: >-
        SELECT PERSON_ID, occ_group FROM (
        SELECT SERIALNO || '_' || CAST(SPORDER AS VARCHAR) AS PERSON_ID,
        CASE WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 10 AND 3550 THEN 'mgmt_business_science_arts'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 3601 AND 4655 THEN 'service'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 4700 AND 5940 THEN 'sales_office'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 6005 AND 7640 THEN 'natural_resources_construction'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 7700 AND 9760 THEN 'production_transportation'
        ELSE NULL END AS occ_group
        FROM source) sub WHERE occ_group IS NOT NULL

    - id: person_works_in_occ_subgroup
      uri: "file:///mnt/2tb/fastopendata/sample_data/psam_pus.parquet"
      relationship_type: WORKS_IN
      source_entity_type: PersonSurvey1yr
      target_entity_type: OccupationSubgroup
      source_col: PERSON_ID
      target_col: occ_subgroup
      query: >-
        SELECT PERSON_ID, occ_subgroup FROM (
        SELECT SERIALNO || '_' || CAST(SPORDER AS VARCHAR) AS PERSON_ID,
        CASE WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 10 AND 440 THEN 'management'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 500 AND 960 THEN 'business_financial'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 1005 AND 1240 THEN 'computer_math'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 1305 AND 1560 THEN 'architecture_engineering'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 1600 AND 1980 THEN 'life_physical_social_science'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 2001 AND 2060 THEN 'community_social_service'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 2100 AND 2180 THEN 'legal'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 2205 AND 2555 THEN 'education_library'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 2600 AND 2920 THEN 'arts_design_entertainment'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 3000 AND 3550 THEN 'healthcare_practitioners'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 3601 AND 3655 THEN 'healthcare_support'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 3700 AND 3960 THEN 'protective_service'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 4000 AND 4160 THEN 'food_preparation_serving'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 4200 AND 4255 THEN 'building_grounds'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 4330 AND 4655 THEN 'personal_care_service'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 4700 AND 4965 THEN 'sales'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 5000 AND 5940 THEN 'office_admin_support'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 6005 AND 6130 THEN 'farming_fishing_forestry'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 6200 AND 6950 THEN 'construction_extraction'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 7000 AND 7640 THEN 'installation_maintenance_repair'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 7700 AND 8990 THEN 'production'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 9005 AND 9430 THEN 'transportation'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 9510 AND 9760 THEN 'material_moving'
        WHEN TRY_CAST(LEFT(SOCP, 4) AS INTEGER) BETWEEN 9800 AND 9830 THEN 'military'
        ELSE NULL END AS occ_subgroup
        FROM source) sub WHERE occ_subgroup IS NOT NULL

    - id: person_works_in_industry
      uri: "file:///mnt/2tb/fastopendata/sample_data/psam_pus.parquet"
      relationship_type: EMPLOYED_IN
      source_entity_type: PersonSurvey1yr
      target_entity_type: IndustryGroup
      source_col: PERSON_ID
      target_col: industry_group
      query: >-
        SELECT PERSON_ID, industry_group FROM (
        SELECT SERIALNO || '_' || CAST(SPORDER AS VARCHAR) AS PERSON_ID,
        CASE WHEN TRY_CAST(INDP AS INTEGER) BETWEEN 170 AND 490 THEN 'agriculture_mining'
        WHEN TRY_CAST(INDP AS INTEGER) = 770 THEN 'construction'
        WHEN TRY_CAST(INDP AS INTEGER) BETWEEN 1070 AND 3990 THEN 'manufacturing'
        WHEN TRY_CAST(INDP AS INTEGER) BETWEEN 4070 AND 4590 THEN 'wholesale_trade'
        WHEN TRY_CAST(INDP AS INTEGER) BETWEEN 4670 AND 5791 THEN 'retail_trade'
        WHEN (TRY_CAST(INDP AS INTEGER) BETWEEN 570 AND 690 OR TRY_CAST(INDP AS INTEGER) BETWEEN 6070 AND 6390) THEN 'transportation_utilities'
        WHEN TRY_CAST(INDP AS INTEGER) BETWEEN 6471 AND 6781 THEN 'information'
        WHEN TRY_CAST(INDP AS INTEGER) BETWEEN 6871 AND 7190 THEN 'finance_real_estate'
        WHEN TRY_CAST(INDP AS INTEGER) BETWEEN 7270 AND 7790 THEN 'professional_management'
        WHEN TRY_CAST(INDP AS INTEGER) BETWEEN 7860 AND 8470 THEN 'education_healthcare'
        WHEN TRY_CAST(INDP AS INTEGER) BETWEEN 8561 AND 8690 THEN 'arts_entertainment_food'
        WHEN TRY_CAST(INDP AS INTEGER) BETWEEN 8770 AND 9290 THEN 'other_services'
        WHEN TRY_CAST(INDP AS INTEGER) BETWEEN 9370 AND 9590 THEN 'public_administration'
        WHEN TRY_CAST(INDP AS INTEGER) BETWEEN 9670 AND 9870 THEN 'military_industry'
        ELSE NULL END AS industry_group
        FROM source) sub WHERE industry_group IS NOT NULL

    - id: person_speaks_language_group
      uri: "file:///mnt/2tb/fastopendata/sample_data/psam_pus.parquet"
      relationship_type: SPEAKS
      source_entity_type: PersonSurvey1yr
      target_entity_type: LanguageGroup
      source_col: PERSON_ID
      target_col: language_group
      query: >-
        SELECT SERIALNO || '_' || CAST(SPORDER AS VARCHAR) AS PERSON_ID,
        CASE WHEN LANP IS NULL THEN 'english_only'
        WHEN TRY_CAST(LANP AS INTEGER) = 1200 THEN 'spanish'
        WHEN TRY_CAST(LANP AS INTEGER) BETWEEN 1000 AND 1287 THEN 'european'
        WHEN TRY_CAST(LANP AS INTEGER) BETWEEN 1288 AND 1899 THEN 'south_central_asian'
        WHEN TRY_CAST(LANP AS INTEGER) BETWEEN 1900 AND 3600 THEN 'east_southeast_asian_pacific'
        WHEN TRY_CAST(LANP AS INTEGER) BETWEEN 4500 AND 9998 THEN 'middle_eastern_african'
        ELSE 'other_unspecified' END AS language_group
        FROM source

