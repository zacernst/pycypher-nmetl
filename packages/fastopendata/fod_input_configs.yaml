      uri: "file:///run/media/zac/2tb/fastopendata/data/state_county_tract_puma_crosswalk.csv"
      relationship_type: IN
      source_col: TRACT_FIPS
      target_col: COUNTY_FIPS
      schema_hints:
        STATEFP: STRING
        COUNTYFP: STRING
        TRACTFP: STRING
        PUMA5CE: STRING
        STATE_FIPS: STRING
        COUNTY_FIPS: STRING
        TRACT_FIPS: STRING
