        EAL_VALT: FLOAT
        SOVI_SCORE: FLOAT
        SOVI_RATNG: STRING
        RESL_SCORE: FLOAT
        RESL_RATNG: STRING
        RFLD_RISKS: FLOAT
        RFLD_RISKR: STRING
        RFLD_EALB: FLOAT
        HRCN_RISKS: FLOAT
        HRCN_RISKR: STRING
        HRCN_EALB: FLOAT
        WFIR_RISKS: FLOAT
        WFIR_RISKR: STRING
        WFIR_EALB: FLOAT
        TRND_RISKS: FLOAT
        TRND_RISKR: STRING
        TRND_EALB: FLOAT
        ERQK_RISKS: FLOAT
        ERQK_RISKR: STRING
        ERQK_EALB: FLOAT
        HAIL_RISKS: FLOAT
        HAIL_RISKR: STRING
        HAIL_EALB: FLOAT
        SWND_RISKS: FLOAT
        SWND_RISKR: STRING
        SWND_EALB: FLOAT
