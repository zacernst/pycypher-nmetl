    uri: file:///home/zac/git/pycypher-nmetl/packages/fastopendata/src/fastopendata/output/inside.csv
  - query_id: num_counties
    uri: file:///home/zac/git/pycypher-nmetl/packages/fastopendata/src/fastopendata/output/num_counties.csv
  - query_id: county_counter
    uri: file:///home/zac/git/pycypher-nmetl/packages/fastopendata/src/fastopendata/output/county_counter.csv
  - query_id: osm_longitude
    uri: file:///home/zac/git/pycypher-nmetl/packages/fastopendata/src/fastopendata/output/osm.csv
