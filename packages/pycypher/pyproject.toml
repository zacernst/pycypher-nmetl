[build-system]
requires = [ "hatchling>=1.24.2", "hatch-vcs>=0.3.0",]
build-backend = "hatchling.build"

[project]
name = "pycypher"
version = "0.0.19"
description = "Cypher parser and query executor for Python"
readme = "README.md"
requires-python = ">=3.12"
keywords = [ "neo4j", "cypher",]
classifiers = [ "Development Status :: 3 - Alpha", "Intended Audience :: Developers", "License :: OSI Approved :: MIT License", "Programming Language :: Python :: 3.14",]
dependencies = [
    "shared",
    "pydantic>=2.9.2,<3.0.0",
    "lark>=1.3.1,<2.0.0",
    "pandas>=3.0.0,<4.0.0",
    "pyarrow>=18.0.0,<25.0.0",
    "duckdb>=1.0.0,<2.0.0",
    "pyyaml>=6.0.0,<7.0.0",
    "click>=8.0.0,<9.0.0",
    "numpy>=2.0.0,<3.0.0",
]

[[project.authors]]
name = "Zachary Ernst"
email = "zac.ernst@gmail.com"

[[project.maintainers]]
name = "Zachary Ernst"
email = "zac.ernst@gmail.com"

[project.license]
file = "LICENSE.txt"

[project.optional-dependencies]
neo4j = [ "neo4j>=5.0.0,<7.0.0",]
large-dataset = [
    "dask[dataframe]>=2025.1.0,<2027.0.0",
    "distributed>=2025.1.0,<2027.0.0",
]
storage = [
    "deltalake>=0.18.0,<2.0.0",
]
cloud = [
    "s3fs>=2025.1.0,<2027.0.0",
    "gcsfs>=2025.1.0,<2027.0.0",
]
polars = [
    "polars>=1.0.0,<2.0.0",
]
all = [
    "pycypher[large-dataset,storage,cloud,neo4j,polars]",
]

[project.urls]
Homepage = "https://github.com/zacernst/pycypher"

[project.scripts]
nmetl = "pycypher.nmetl_cli:main"

[tool.ruff]
exclude = [ ".bzr", ".direnv", ".eggs", ".git", ".git-rewrite", ".hg", ".ipynb_checkpoints", ".mypy_cache", ".nox", ".pants.d", ".pyenv", ".pytest_cache", ".pytype", ".ruff_cache", ".svn", ".tox", ".venv", ".vscode", "__pypackages__", "_build", "buck-out", "build", "dist", "node_modules", "site-packages", "venv",]
line-length = 79
indent-width = 4
target-version = "py314"


[tool.coverage.report]
exclude_also = [ "def tree", "def print_tree", "def __repr__", "if self.debug:", "if settings.DEBUG", "raise AssertionError", "raise NotImplementedError", "if 0:", "if __name__ == .__main__.:", "if TYPE_CHECKING:", "class .*\\bProtocol\\):", "@(abc\\.)?abstractmethod",]

[tool.coverage.run]
omit = [
    # omit anything in a .local directory anywhere
    "*/.local/*",
    "/*.py",
    "*/filter_us_nodes.py"
    ]

[tool.pytest.ini_options]
addopts = ""
testpaths = [ "tests",]
