services:
  # Main pycypher development container
  pycypher-dev:
    container_name: pycypher-dev
    # platform auto-detected; override with DOCKER_DEFAULT_PLATFORM if needed
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    volumes:
      # Mount entire project for monorepo development
      - .:/workspace
      # Cache uv packages to speed up rebuilds
      - uv-cache:/root/.cache/uv
      # Cache pytest
      - pytest-cache:/workspace/.pytest_cache
    healthcheck:
      test: ["CMD", "uv", "run", "nmetl", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # allow time for uv sync
    environment:
      # Python environment
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - LC_ALL=C.UTF-8
      - LANG=C.UTF-8
      # GitHub token for private dependencies (if needed)
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # Spark cluster
      - SPARK_MASTER_URL=spark://spark-master:7077
      - PYSPARK_PYTHON=/usr/bin/python3
      - SPARK_EVENTS_DIR=/opt/bitnami/spark/spark-events
      # Neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:?Set NEO4J_USER in .env}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      # Nominatim geocoder
      - NOMINATIM_URL=http://nominatim:8080
    depends_on:
      - spark-master
      - neo4j
    command: >
      bash -c "
        echo 'Installing pycypher in development mode...' &&
        cd /workspace &&
        uv sync &&
        uv pip install -e packages/pycypher &&
        echo 'Pycypher development environment ready!' &&
        echo 'Run: docker exec -it pycypher-dev bash' &&
        tail -f /dev/null
      "
    stdin_open: true
    tty: true

