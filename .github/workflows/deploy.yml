name: Deploy to Cloud Run

# Runs only after the CI workflow succeeds on main — never on PRs or failed CI.
on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  contents: read

env:
  PROJECT_ID: fastopendata-392817
  REGION: us-central1
  SERVICE: fastopendata-site
  # Artifact Registry repo must exist before first push:
  #   gcloud artifacts repositories create fastopendata-site \
  #     --repository-format=docker --location=us-central1 \
  #     --project=fastopendata-392817
  REGISTRY: us-central1-docker.pkg.dev
  AR_REPO: fastopendata-site

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    # Only proceed when CI actually passed — skip on failure/cancellation.
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Check out the commit that triggered CI, not the default HEAD.
          ref: ${{ github.event.workflow_run.head_sha }}

      # Required GitHub secret:
      #   GCP_SA_KEY — JSON key for the deploy service account
      #     (github-actions@fastopendata-392817.iam.gserviceaccount.com)
      #
      # Authenticating directly with a key authenticates *as* the service
      # account, so it never calls iam.serviceAccounts.getAccessToken — which
      # is what the previous Workload Identity impersonation flow failed on.
      #
      # The service account needs these IAM roles:
      #   roles/run.admin
      #   roles/artifactregistry.writer
      #   roles/iam.serviceAccountUser
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: ">= 363.0.0"

      # Debug: surfaces the identity the key actually authenticates as, so we
      # can confirm it matches the SA granted artifactregistry.writer.
      - name: Debug — show active account
        run: gcloud auth list --filter=status:ACTIVE --format="value(account)"

      # Uses the credentials file exported by the auth action above.
      - name: Verify Artifact Registry access
        run: |
          ERROR_LOG="$(mktemp)"
          if gcloud artifacts repositories describe "${{ env.AR_REPO }}" \
            --location "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" > /dev/null 2>"$ERROR_LOG"; then
            echo "CAN_DEPLOY=true" >> "$GITHUB_ENV"
          else
            ERROR_REASON="$(tail -n 1 "$ERROR_LOG")"
            echo "::warning::Skipping push/deploy because Artifact Registry access is unavailable for ${{ env.PROJECT_ID }}/${{ env.AR_REPO }}. ${ERROR_REASON}"
            echo "CAN_DEPLOY=false" >> "$GITHUB_ENV"
          fi

      - name: Configure Artifact Registry auth
        if: env.CAN_DEPLOY == 'true'
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE }}"
          SHA_TAG="${IMAGE}:${{ github.event.workflow_run.head_sha }}"
          docker build -f Dockerfile.site -t "$SHA_TAG" -t "${IMAGE}:latest" .
          echo "SHA_TAG=$SHA_TAG" >> "$GITHUB_ENV"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Push to Artifact Registry
        if: env.CAN_DEPLOY == 'true'
        run: |
          docker push "$SHA_TAG"
          docker push "$IMAGE:latest"

      - name: Deploy to Cloud Run
        if: env.CAN_DEPLOY == 'true'
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.SHA_TAG }}
          flags: --allow-unauthenticated

      - name: Print service URL
        if: env.CAN_DEPLOY == 'true'
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
