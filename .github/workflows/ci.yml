name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Principle of least privilege: only request the permissions each job needs.
# Default is read-only; individual jobs can escalate if required.
permissions:
  contents: read

env:
  UV_SYSTEM_PYTHON: "0"

jobs:
  # ──────────────────────────────────────────────
  # Lockfile integrity check (fast, blocks all jobs)
  # ──────────────────────────────────────────────
  lock-check:
    name: Lockfile Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.14 (managed by uv)
        run: uv python install 3.14t

      - name: Verify uv.lock is in sync with pyproject.toml
        run: uv sync --frozen --dry-run

  # ──────────────────────────────────────────────
  # Install & test (parallel execution)
  # ──────────────────────────────────────────────
  test:
    name: Tests (Python 3.14)
    needs: lock-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.14 (managed by uv)
        run: uv python install 3.14t

      - name: Install workspace dependencies
        run: uv sync --frozen

      - name: Run unit and integration tests (parallel)
        run: uv run pytest -n auto --timeout=30 -q --tb=short

  # ──────────────────────────────────────────────
  # Lint & format check
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Format
    needs: lock-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.14 (managed by uv)
        run: uv python install 3.14t

      - name: Install workspace dependencies
        run: uv sync --frozen

      - name: Check import sorting (ruff, advisory)
        run: uv run ruff check --select I .
        continue-on-error: true

      - name: Check code formatting (ruff, advisory)
        run: uv run ruff format --check .
        continue-on-error: true

      - name: Lint (ruff, advisory — 26k existing violations to resolve)
        run: uv run ruff check .
        continue-on-error: true

      - name: Lint changed files only (blocking — enforces quality on new code)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          ./scripts/lint_changed.sh origin/${{ github.base_ref }}

      - name: Type check — source (ty, blocking)
        run: uv run ty check packages/pycypher/ packages/shared/

      - name: Type check — tests (ty, advisory)
        run: uv run ty check tests/
        continue-on-error: true

  # ──────────────────────────────────────────────
  # API surface: detect breaking changes
  # ──────────────────────────────────────────────
  api-surface:
    name: API Surface Check
    needs: lock-check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.14 (managed by uv)
        run: uv python install 3.14t

      - name: Install workspace dependencies
        run: uv sync --frozen

      - name: Check for breaking API changes
        run: uv run python scripts/check_api_surface.py

  # ──────────────────────────────────────────────
  # Security: dependency + code vulnerability scanning
  # ──────────────────────────────────────────────
  security:
    name: Security Audit (Dependencies + SAST)
    needs: lock-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.14 (managed by uv)
        run: uv python install 3.14t

      - name: Install workspace dependencies
        run: uv sync --frozen

      - name: Audit dependencies for known vulnerabilities
        run: uv run pip-audit --desc --skip-editable
        continue-on-error: true

      - name: SAST — bandit security scan (advisory)
        run: |
          uv run bandit -r packages/pycypher/src/ packages/shared/src/ \
            -c pyproject.toml \
            --severity-level medium \
            -f txt \
            || true
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Performance regression detection
  # ──────────────────────────────────────────────
  benchmarks:
    name: Performance Benchmarks
    needs: lock-check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.14 (managed by uv)
        run: uv python install 3.14t

      - name: Install workspace dependencies
        run: uv sync --frozen

      - name: Run benchmarks (excluding slow/100K scale)
        run: |
          uv run pytest tests/benchmarks/bench_core_operations.py \
            -v --benchmark-only -m "not slow" --timeout=120 \
            --benchmark-json=benchmark-results.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json
          retention-days: 30

  # ──────────────────────────────────────────────
  # Dependency compatibility (large-dataset backends)
  # ──────────────────────────────────────────────
  dependency-compat:
    name: Dependency Compatibility (Python 3.14t)
    needs: lock-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.14 (managed by uv)
        run: uv python install 3.14t

      - name: Install workspace dependencies
        run: uv sync --frozen

      - name: Verify large-dataset backend imports
        run: |
          uv run python -c "
          import dask; import dask.dataframe
          import distributed
          import polars
          import deltalake
          import duckdb
          import pandas
          import pyarrow
          print('All large-dataset backends import successfully')
          "

      - name: Run dependency compatibility tests
        run: uv run pytest tests/test_large_dataset_dependency_compat.py -q --tb=short

  # ──────────────────────────────────────────────
  # Build Sphinx documentation
  # ──────────────────────────────────────────────
  docs:
    name: Documentation build
    needs: lock-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.14 (managed by uv)
        run: uv python install 3.14t

      - name: Install workspace dependencies
        run: uv sync --frozen

      - name: Build HTML documentation
        run: uv run sphinx-build -b html docs docs/_build/html --keep-going

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: html-docs
          path: docs/_build/html/
          retention-days: 7
